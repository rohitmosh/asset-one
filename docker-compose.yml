
services:
  postgres:
    image: postgres:17-alpine
    container_name: eams_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eams}
      - POSTGRES_USER=${POSTGRES_USER:-eams_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eams_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eams_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://eams_user:strong_password@postgres:5432/eams}
      - JWT_SECRET=${JWT_SECRET:-ohpc-eams-super-secret-key-2026-xyz-emerald}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - eams_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eams_frontend
    restart: unless-stopped
    networks:
      - eams_network

  nginx:
    image: nginx:1.25-alpine
    container_name: eams_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads_data:/app/uploads:ro
    networks:
      - eams_network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  eams_network:
    driver: bridge
